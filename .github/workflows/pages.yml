name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache-bust shell assets
        # GitHub Pages/Safari can keep serving a cached shell/*.js or
        # shell/*.css from before a deploy even after index.html itself is
        # fresh, since none of these URLs ever change -- which produces a
        # broken mix of new markup with old script/style behavior (seen
        # after the passkey/ghost-button/network-status change: new HTML,
        # stale CSS and JS). Appending the commit SHA to every shell/
        # asset reference -- both the <link>/<script> tags in index.html
        # and the static `import ... from "./x.js"` specifiers inside
        # shell/*.js -- gives each deploy a unique URL per file, so a
        # fresh visit always gets the matching set. Source files on disk
        # stay unversioned; this only touches the uploaded artifact.
        #
        # modules/manifest.js's own url IS covered by the `from "..."`
        # pass below (module-registry.js imports it that way), but the
        # per-module path/css strings *inside* manifest.js are a plain
        # data array, not `from "..."` specifiers, so they need their own
        # pass -- module-registry.js builds each module's script/link URL
        # straight from those strings via `new URL(entry.path, ...)`.
        # Missed this the first time around ("those files change far less
        # often" turned out to be wrong) and iterating on a module's
        # module.js/module.css kept serving a stale cached copy on phones
        # even though index.html/shell/* were fresh.
        run: |
          VERSION="${GITHUB_SHA::8}"
          sed -i "s#href=\"shell/tokens.css\"#href=\"shell/tokens.css?v=${VERSION}\"#" web/index.html
          sed -i "s#href=\"shell/shell.css\"#href=\"shell/shell.css?v=${VERSION}\"#" web/index.html
          sed -i "s#src=\"shell/shell.js\"#src=\"shell/shell.js?v=${VERSION}\"#" web/index.html
          sed -i "s#src=\"config.js\"#src=\"config.js?v=${VERSION}\"#" web/index.html
          sed -i -E "s#(from \"\.\.?/[A-Za-z0-9_./-]+\.js)\"#\1?v=${VERSION}\"#g" web/shell/*.js web/modules/manifest.js
          sed -i -E "s#(path|css): \"(\./[A-Za-z0-9_./-]+\.(js|css))\"#\1: \"\2?v=${VERSION}\"#g" web/modules/manifest.js

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
