<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- compass ring -->
  <circle cx="150" cy="150" r="132" />
  <circle cx="150" cy="150" r="122" />
  <circle cx="150" cy="150" r="60" />

  <!-- cardinal ticks + spokes to the inner ring -->
  <line x1="150" y1="6"   x2="150" y2="30" />
  <line x1="150" y1="270" x2="150" y2="294" />
  <line x1="6"   y1="150" x2="30"  y2="150" />
  <line x1="270" y1="150" x2="294" y2="150" />
  <line x1="150" y1="30"  x2="150" y2="90" />
  <line x1="150" y1="210" x2="150" y2="270" />
  <line x1="30"  y1="150" x2="90"  y2="150" />
  <line x1="210" y1="150" x2="270" y2="150" />

  <!-- ordinal ticks (shorter) -->
  <line x1="235" y1="65"  x2="252" y2="48" />
  <line x1="235" y1="235" x2="252" y2="252" />
  <line x1="65"  y1="235" x2="48"  y2="252" />
  <line x1="65"  y1="65"  x2="48"  y2="48" />
  <line x1="207" y1="93"  x2="228" y2="72" />
  <line x1="207" y1="207" x2="228" y2="228" />
  <line x1="93"  y1="207" x2="72"  y2="228" />
  <line x1="93"  y1="93"  x2="72"  y2="72" />

  <!-- star needle -->
  <path d="M150 90 L160 145 L210 150 L160 155 L150 210 L140 155 L90 150 L140 145 Z" />
  <circle cx="150" cy="150" r="6" />
</svg>
