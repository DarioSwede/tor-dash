<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- compass ring -->
  <circle cx="150" cy="150" r="132" />
  <circle cx="150" cy="150" r="122" />
  <!-- cardinal ticks (N/E/S/W, longer) -->
  <line x1="150" y1="6"   x2="150" y2="30" />
  <line x1="150" y1="270" x2="150" y2="294" />
  <line x1="6"   y1="150" x2="30"  y2="150" />
  <line x1="270" y1="150" x2="294" y2="150" />
  <!-- ordinal ticks (NE/SE/SW/NW, shorter) -->
  <line x1="235" y1="65"  x2="252" y2="48" />
  <line x1="235" y1="235" x2="252" y2="252" />
  <line x1="65"  y1="235" x2="48"  y2="252" />
  <line x1="65"  y1="65"  x2="48"  y2="48" />

  <!-- dagger, vertical, behind the skull -->
  <line x1="150" y1="38" x2="150" y2="252" />
  <path d="M141 44 L150 30 L159 44 Z" />
  <line x1="128" y1="152" x2="172" y2="152" />

  <!-- skull -->
  <path d="M108 118
           C108 84 126 62 150 62
           C174 62 192 84 192 118
           C192 140 184 152 178 162
           L178 182
           C178 190 172 194 165 194
           L165 202 C165 208 160 210 156 210
           L156 202
           L144 202 L144 210
           C140 210 135 208 135 202
           L135 194
           C128 194 122 190 122 182
           L122 162
           C116 152 108 140 108 118 Z" />

  <!-- eye sockets -->
  <circle cx="130" cy="120" r="15" />
  <circle cx="170" cy="120" r="15" />

  <!-- nasal cavity -->
  <path d="M150 138 L142 154 L158 154 Z" />

  <!-- jaw teeth ticks -->
  <line x1="138" y1="194" x2="138" y2="202" />
  <line x1="150" y1="196" x2="150" y2="206" />
  <line x1="162" y1="194" x2="162" y2="202" />
</svg>
